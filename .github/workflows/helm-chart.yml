name: Package and publish Helm chart

on:
  push:
    branches:
      - master
    paths:
      - chart/**
      - artifacthub-repo.yml
      - .github/workflows/helm-chart.yml

permissions:
  contents: read
  id-token: write
  pages: write
  packages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint chart --values chart/ci/lint-values.yaml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Helm registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p .helm public
          helm package chart --destination .helm
          cp .helm/multicast-relay-*.tgz public/
          cp artifacthub-repo.yml public/
          helm repo index public --url https://turgon37.github.io/multicast-relay

      - name: Push Helm chart as OCI artifact
        id: push
        run: |
          output=$(helm push .helm/multicast-relay-*.tgz oci://ghcr.io/turgon37/charts)
          echo "$output"
          digest=$(echo "$output" | sed -n 's/^Digest: //p')
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Helm chart
        run: cosign sign --yes ghcr.io/turgon37/charts/multicast-relay@${{ steps.push.outputs.digest }}

      - name: Upload Helm repository to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    needs: helm
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Helm repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
