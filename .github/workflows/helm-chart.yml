name: Package and publish Helm chart

on:
  push:
    branches:
      - master
    paths:
      - chart/**
      - .github/workflows/helm-chart.yml

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint chart --values chart/ci/lint-values.yaml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Helm registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package Helm chart
        run: helm package chart --destination .helm

      - name: Push Helm chart as OCI artifact
        id: push
        run: |
          output=$(helm push .helm/multicast-relay-*.tgz oci://ghcr.io/turgon37/charts)
          echo "$output"
          digest=$(echo "$output" | sed -n 's/^Digest: //p')
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Helm chart
        run: cosign sign --yes ghcr.io/turgon37/charts/multicast-relay@${{ steps.push.outputs.digest }}
